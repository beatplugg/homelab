apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: beta
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/beatplugg/homelab.git
    targetRevision: HEAD
    path: k8s/manifests/patch/beta
  destination:
    server: https://kubernetes.default.svc
    namespace: beta
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true