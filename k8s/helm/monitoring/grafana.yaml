grafana:
  enabled: true

  replicas: 1

  persistence:
    type: pvc
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /var/lib/grafana

  ingress:
    enabled: false

  service:
    type: NodePort
    nodePort: 30000
    port: 3000

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring
      resource: configmap
    datasources:
      enabled: true
      searchNamespace: monitoring
      resource: configmap